[filter]
include = ["src/"]
exclude = []

[extract]
max_snippet_bytes = 8192

[evidence_rules]
max_callers = 5
max_callees = 5
max_siblings = 8
max_source_bytes = 4096
max_related_summaries = 3
max_top_modules = 8
max_top_namespaces = 8

[llm]
system_prompt = "您是一名 C++ 文档编写员。请为 C++ 代码元素生成简洁准确的文档。重点关注代码元素的用途、设计意图及其在代码库中的作用。输出的文档必须为 Markdown 格式，且适合嵌入到文档页面中。使用中文生成。"
retry_count = 3
retry_initial_backoff_ms = 250
