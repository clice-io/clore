name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        os: [ "ubuntu-latest", "macos-latest" ]

    runs-on: "${{ matrix.os }}"
    env:
      BUILD_TYPE: Debug
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: v0.67.0
          activate-environment: true
          cache: true

      - name: Cache config layer
        id: cache-config
        uses: actions/cache@v5
        with:
          path: |
            build/${{ env.BUILD_TYPE }}/CMakeCache.txt
            build/${{ env.BUILD_TYPE }}/build.ninja
            build/${{ env.BUILD_TYPE }}/cmake_install.cmake
            build/${{ env.BUILD_TYPE }}/compile_commands.json
            build/${{ env.BUILD_TYPE }}/CMakeFiles/
            build/${{ env.BUILD_TYPE }}/_deps/
            build/${{ env.BUILD_TYPE }}/src/cmake_install.cmake
            build/${{ env.BUILD_TYPE }}/tests/cmake_install.cmake
          key: ${{ runner.os }}-config-v1-${{ hashFiles('pixi.lock', 'pixi.toml') }}-cmake-${{ hashFiles('CMakeLists.txt', 'src/CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-config-v1-${{ hashFiles('pixi.lock', 'pixi.toml') }}-
            ${{ runner.os }}-config-v1-

      - name: Configure
        run: pixi run config

      - name: Cache build layer
        id: cache-build
        uses: actions/cache@v5
        with:
          path: |
            build/${{ env.BUILD_TYPE }}/.ninja_deps
            build/${{ env.BUILD_TYPE }}/.ninja_log
            build/${{ env.BUILD_TYPE }}/src/CMakeFiles/
            build/${{ env.BUILD_TYPE }}/src/clore
            build/${{ env.BUILD_TYPE }}/src/libclore-core.a
            build/${{ env.BUILD_TYPE }}/tests/CMakeFiles/
            build/${{ env.BUILD_TYPE }}/tests/unit_tests
          key: ${{ runner.os }}-build-v1-${{ hashFiles('pixi.lock', 'pixi.toml') }}-cmake-${{ hashFiles('CMakeLists.txt', 'src/CMakeLists.txt', 'tests/CMakeLists.txt') }}-src-${{ hashFiles('src/**/*', 'tests/**/*') }}
          restore-keys: |
            ${{ runner.os }}-build-v1-${{ hashFiles('pixi.lock', 'pixi.toml') }}-cmake-${{ hashFiles('CMakeLists.txt', 'src/CMakeLists.txt', 'tests/CMakeLists.txt') }}-
            ${{ runner.os }}-build-v1-${{ hashFiles('pixi.lock', 'pixi.toml') }}-
            ${{ runner.os }}-build-v1-

      - name: Build
        run: pixi run build

      - name: Test
        run: pixi run test
