[workspace]
name = "clore"
version = "0.1.0"
description = "A C++ documentation generator for modern C++ projects"
authors = ["yihtseu <i@yizhou.ac.cn>"]
documentation = "https://docs.clice.io/clore/"
repository = "https://github.com/clice-io/clore"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[dependencies]
cmake = "==4.3.1"
ninja = "==1.13.2"
cppcheck = "==2.20.1"
fd-find = "==10.4.2"
spdlog = "==1.17.0"
libcurl = "==8.19.0"
openssl = "==3.6.2"
clang = "==22.1.3"
clangdev = "==22.1.3"
clangxx = "==22.1.3"
clang-tools = "==22.1.3"
llvmdev = "==22.1.3"
llvm-tools = "==22.1.3"
compiler-rt = "==22.1.3"
zlib = "==1.3.2"
libxml2-devel = "==2.15.3"

[target.win-64.dependencies]
lld = "==22.1.3"

[target.win-64.activation.env]
CC = "clang.exe"
CXX = "clang++.exe"
RC = "llvm-rc.exe"

[target.linux-64.dependencies]
sysroot_linux-64 = "==2.39"
mold = "==2.40.4"
libstdcxx = "==15.2.0"
libstdcxx-devel_linux-64 = "==15.2.0"
libgcc-devel_linux-64 = "==15.2.0"

[target.linux-64.activation.env]
CC = "clang"
CXX = "clang++"
CXXFLAGS = "-stdlib=libstdc++"
LDFLAGS = "-stdlib=libstdc++ -fuse-ld=mold"

[target.osx-arm64.activation.env]
CC = "clang"
CXX = "clang++"

[tasks.config]
args = [{ arg = "type", default = "Debug" }]
cmd = "cmake -B build/{{ type }} -G Ninja -DCMAKE_BUILD_TYPE={{ type }}"
inputs = ["CMakeLists.txt", "src/CMakeLists.txt", "tests/CMakeLists.txt"]
outputs = ["build/{{ type }}/CMakeCache.txt"]

[tasks.format]
cmd = "fd -e h -e cpp -e cppm -t f . src tests -x clang-format -i"

[tasks.check]
args = [{ arg = "type", default = "Debug" }]
cmd = "cppcheck -j8 --quiet --std=c++23 src tests"

[tasks.build]
args = [{ arg = "type", default = "Debug" }]
cmd = "cmake --build build/{{ type }} --parallel"
inputs = ["src/", "tests/", "build/{{ type }}/CMakeCache.txt"]
depends-on = [{ task = "config", args = ["{{ type }}"] }]

[tasks.test]
args = [{ arg = "type", default = "Debug" }]
cmd = "./build/{{ type }}/tests/unit_tests"
depends-on = [{ task = "build", args = ["{{ type }}"] }]