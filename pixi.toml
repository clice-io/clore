# tombi: format.rules.table-keys-order.disabled = true

[workspace]
name = "clore"
version = "0.1.0"
description = "A C++ documentation generator for modern C++ projects"
authors = ["yihtseu <i@yizhou.ac.cn>"]
documentation = "https://docs.clice.io/clore/"
repository = "https://github.com/clice-io/clore"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

[environments]
default = ["build"]
format = ["format"]

# ============================================================================== #
#                                  DEPENDENCIES                                  #
# ============================================================================== #
[feature.build.dependencies]
python = ">=3.13"
cmake = ">=3.30"
ninja = "*"
libcurl = "*"
clang = "==20.1.8"
clangxx = "==20.1.8"
clang-tools = "==20.1.8"
lld = "==20.1.8"
llvm-tools = "==20.1.8"
compiler-rt = "==20.1.8"

[feature.build.target.win-64.dependencies]
sccache = "*"

[feature.build.target.linux-64.dependencies]
sysroot_linux-64 = "==2.17"
gcc = "==14.2.0"
gxx = "==14.2.0"
ccache = "*"

[feature.build.target.osx-arm64.dependencies]
ccache = "*"

[feature.build.target.linux-64.activation]
scripts = ["scripts/activate_linux.sh"]

[feature.build.target.win-64.activation]
scripts = ["scripts/activate_asan.bat"]


# ============================================================================== #
#                                   CMAKE                                        #
# ============================================================================== #
[feature.build.tasks.cmake-config]
args = [{ arg = "type", default = "RelWithDebInfo" }]
cmd = """
cmake -B build/{{ type }} -G Ninja \
    -DCMAKE_BUILD_TYPE={{ type }} \
    -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain.cmake \
    -DCLORE_ENABLE_TEST=ON
"""

[feature.build.tasks.cmake-build]
args = [{ arg = "type", default = "RelWithDebInfo" }]
cmd = "cmake --build build/{{ type }} --parallel"

[feature.build.tasks.build]
args = [{ arg = "type", default = "RelWithDebInfo" }]
depends-on = [
    { task = "cmake-config", args = [
        "{{ type }}",
    ] },
    { task = "cmake-build", args = [
        "{{ type }}",
    ] },
]

[feature.build.tasks.test]
args = [{ arg = "type", default = "RelWithDebInfo" }]
cmd = "./build/{{ type }}/bin/unit_tests"

# ============================================================================== #
#                                    FORMAT                                      #
# ============================================================================== #
[feature.format.dependencies]
ruff = "*"
tombi = "*"
fd-find = "*"
prettier = "*"
clang-format = "==21.1.7"

[feature.format.tasks]
format-cpp = "fd -H -e cpp -e h -e cc -e hpp -e cppm -x clang-format -i"
format-python = "ruff format ."
format-markdown = "fd -H -e md -x prettier --write"
format-json = "fd -H -e json -x prettier --write"
format-toml = "fd -H -e toml -x tombi format"
format-yaml = """
fd -H -e yaml -e yml -x prettier --write && \
fd -H "^\\.clang-(format|tidy)$" -x prettier --write --parser yaml
"""
format = { depends-on = [
    "format-cpp",
    "format-python",
    "format-markdown",
    "format-json",
    "format-toml",
    "format-yaml",
] }
